{% extends "blog/base.html" %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <h2 class="fw-bold text-center mb-4"><i class="bi bi-person-plus me-2"></i>Registrarse</h2>
                <form method="post">
                    {% csrf_token %}
                    {% for campo in formulario %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ campo.label }}</label>
                        {{ campo }}
                        {% if campo.errors %}
                        <div class="text-danger small">{{ campo.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Crear cuenta</button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
