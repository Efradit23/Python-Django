{% extends "blog/base.html" %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4"><i class="bi bi-pencil me-2"></i>Editar publicación</h2>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for campo in formulario %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ campo.label }}</label>
                        {{ campo }}
                        {% if campo.errors %}
                        <div class="text-danger small">{{ campo.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-warning"><i class="bi bi-save me-1"></i>Guardar cambios</button>
                        <a href="{% url 'lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
