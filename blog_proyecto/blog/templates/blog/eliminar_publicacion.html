{% extends "blog/base.html" %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5 text-center">
                <i class="bi bi-trash text-danger" style="font-size: 4rem;"></i>
                <h2 class="fw-bold mt-3">¿Eliminar publicación?</h2>
                <p class="text-muted fs-5 mt-2">Estás por eliminar <strong>"{{ publicacion.titulo }}"</strong>. Esta acción no se puede deshacer.</p>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
                        <a href="{% url 'lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
