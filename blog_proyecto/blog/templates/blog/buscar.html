{% extends "blog/base.html" %}

{% block contenido %}
<h2>Buscar publicación</h2>

<div class="card">
<form method="get">
    <input type="text" name="titulo" placeholder="Buscar...">
    <button type="submit">Buscar</button>
</form>
</div>

{% for r in resultados %}
<div class="card">
    <h3>{{ r.titulo }}</h3>
    <p>{{ r.contenido }}</p>
</div>
{% endfor %}

{% endblock %}
