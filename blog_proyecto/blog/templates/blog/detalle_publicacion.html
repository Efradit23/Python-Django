{% extends "blog/base.html" %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            {% if publicacion.imagen %}
            <img src="{{ publicacion.imagen.url }}" class="card-img-top" style="height: 350px; object-fit: cover;">
            {% endif %}
            <div class="card-body p-5">
                <h1 class="fw-bold mb-3">{{ publicacion.titulo }}</h1>
                <p class="text-muted mb-4">
                    <i class="bi bi-person me-1"></i>{{ publicacion.autor }}
                    &nbsp;·&nbsp;
                    <i class="bi bi-calendar me-1"></i>{{ publicacion.fecha|date:"d/m/Y" }}
                </p>
                <hr>
                <div class="fs-5 mt-4">
                    {{ publicacion.contenido|safe }}
                </div>
                <hr class="mt-5">
                <div class="d-flex gap-2">
                    <a href="{% url 'lista' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
                    {% if user.is_authenticated %}
                    <a href="{% url 'editar' publicacion.pk %}" class="btn btn-outline-warning"><i class="bi bi-pencil me-1"></i>Editar</a>
                    <a href="{% url 'eliminar' publicacion.pk %}" class="btn btn-outline-danger"><i class="bi bi-trash me-1"></i>Eliminar</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
