{% extends "blog/base.html" %}

{% block contenido %}
<div class="row">
    <div class="col-md-3">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h6 class="fw-bold mb-3"><i class="bi bi-envelope me-2"></i>Mensajes</h6>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="{% url 'bandeja_entrada' %}"><i class="bi bi-inbox me-2"></i>Bandeja de entrada</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'mensajes_enviados' %}"><i class="bi bi-send me-2"></i>Enviados</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'enviar_mensaje' %}"><i class="bi bi-pencil-square me-2"></i>Nuevo mensaje</a></li>
                </ul>
            </div>
        </div>
    </div>
    <div class="col-md-9">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2"></i>Nuevo mensaje</h2>
                <form method="post">
                    {% csrf_token %}
                    {% for campo in formulario %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ campo.label }}</label>
                        {{ campo }}
                        {% if campo.errors %}
                        <div class="text-danger small">{{ campo.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Enviar</button>
                        <a href="{% url 'bandeja_entrada' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
